<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roma Center SPA - Add Patente</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="loading" class="screen">
        <div class="spinner"></div>
        <p>Cargando...</p>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="screen hidden">
        <div class="header">
            <h2>Romaspa Login</h2>
        </div>
        <form id="login-form">
            <input type="email" id="email" placeholder="Correo electrónico" required />
            <input type="password" id="password" placeholder="Contraseña" required />
            <button type="submit" id="login-btn">Ingresar</button>
            <p id="login-error" class="error hidden"></p>
        </form>
    </div>

    <!-- Main Data Screen -->
    <div id="main-screen" class="screen hidden">
        <div class="header" style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0;">Datos Vehículo</h2>
            <button id="logout-btn" class="text-btn">Salir</button>
        </div>
        
        <p id="not-patente-msg" class="info hidden">No se detectó patentechile.com, revisa los datos manualmente.</p>
        
        <form id="data-form">
            <div class="form-group">
                <label for="patente">Patente</label>
                <input type="text" id="patente" required style="text-transform: uppercase;" />
            </div>
            
            <div class="form-group">
                <label for="owner">Propietario</label>
                <input type="text" id="owner" required />
            </div>

            <div class="form-group">
                <label for="phone">Teléfono</label>
                <input type="text" id="phone" value="Sin teléfono" required />
            </div>

            <div class="form-row" style="display: flex; gap: 8px;">
                <div class="form-group" style="flex:1;">
                    <label for="brand">Marca</label>
                    <input type="text" id="brand" required />
                </div>
                <div class="form-group" style="flex:1;">
                    <label for="model">Modelo</label>
                    <input type="text" id="model" required />
                </div>
            </div>

            <button type="submit" id="save-btn" class="primary-btn">Guardar Cliente</button>
            <p id="save-msg" class="hidden"></p>
        </form>
    </div>

    <script src="popup.js"></script>
</body>
</html>
